<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="value" id="computerScore">0</span>
            </div>
        </div>
        
        <div class="instructions">
            <p>Use <strong>Mouse</strong> or <strong>Arrow Keys</strong> (Up/Down) to move the left paddle</p>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="resetBtn">Reset Score</button>
        </div>

        <div class="info">
            <p>First to 5 points wins!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
          </html>
